<!DOCTYPE html>
<html>
<head>
    <title>Student Productivity Hub</title>
    <button onclick="toggleDarkMode()">
🌙 Dark Mode
</button>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎓 Student Productivity Hub</h1>

    <div class="box">
        <h2>📝 To-Do List</h2>
        <input type="text" id="task">
        <button onclick="addTask()">Add</button>
        <ul id="taskList"></ul>
    </div>

    <div class="box">
        <h2>📊 CGPA Calculator</h2>
        <input type="number" id="cgpa" placeholder="Enter CGPA">
        <button onclick="showCGPA()">Check</button>
        <p id="cgpaResult"></p>
    </div>

</body>
</html>
<div class="box">
    <h2>📚 Attendance Tracker</h2>

    <input type="number" id="attended" placeholder="Classes Attended">

    <input type="number" id="total" placeholder="Total Classes">

    <button onclick="checkAttendance()">Calculate</button>

    <p id="attendanceResult"></p>
</div>
<div class="box">
    <h2>⏱ Pomodoro Timer</h2>

    <p id="timer">25:00</p>

    <button onclick="startTimer()">
    Start
    </button>
</div>
